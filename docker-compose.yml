services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-bolao}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-bolao}
      POSTGRES_DB: bolao_da_copa_production
    volumes:
      - postgres_18_data:/var/lib/postgresql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-bolao}"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: bundle exec thrust ./bin/rails server -b 0.0.0.0
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - storage:/rails/storage

  worker:
    build: .
    command: bundle exec good_job start
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - storage:/rails/storage

volumes:
  postgres_18_data:
  storage:
